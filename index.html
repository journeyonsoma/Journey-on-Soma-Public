<!doctype html>
<html lang="en">
<head>
  <script defer src="/_vercel/insights/script.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journey on Soma</title>
  <meta name="description" content="Under construction." />
  <style>
    :root {
      --bg-0: #05070d;
      --bg-1: #0a1224;
      --grid: rgba(90, 140, 255, 0.15);
      --line: rgba(38, 194, 255, 0.12);
      --text: #d8f2ff;
      --glow: #3bd1ff;
      --accent: #7c4dff;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(1200px 1200px at 50% -10%, #142347 0%, var(--bg-1) 35%, var(--bg-0) 100%);
      font-family: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -40%;
      background:
        linear-gradient(0deg, transparent 24%, var(--line) 25%, transparent 26%),
        linear-gradient(90deg, transparent 24%, var(--line) 25%, transparent 26%);
      background-size: 72px 72px;
      transform: perspective(700px) rotateX(68deg) translateY(18%);
      transform-origin: center;
      opacity: 0.55;
      animation: grid-drift 12s linear infinite;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.02) 1px,
          rgba(0,0,0,0.04) 2px,
          rgba(0,0,0,0.04) 3px
        );
      mix-blend-mode: screen;
      pointer-events: none;
      animation: scan 7s linear infinite;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }

    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .text {
      position: relative;
      margin: 0;
      font-size: clamp(1.2rem, 3.6vw, 2.35rem);
      letter-spacing: 0.22em;
      text-transform: lowercase;
      color: var(--text);
      text-shadow:
        0 0 10px color-mix(in oklab, var(--glow) 55%, transparent),
        0 0 24px color-mix(in oklab, var(--glow) 35%, transparent);
      animation: pulse 2.6s ease-in-out infinite;
      white-space: nowrap;
    }

    .text::before,
    .text::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.55;
    }

    .text::before {
      color: #49f1ff;
      transform: translate(-1px, 0);
      animation: glitch-a 1.8s steps(2, end) infinite;
    }

    .text::after {
      color: var(--accent);
      transform: translate(1px, 0);
      animation: glitch-b 2.4s steps(2, end) infinite;
    }

    @keyframes grid-drift {
      from { transform: perspective(700px) rotateX(68deg) translateY(18%) translateX(0); }
      to { transform: perspective(700px) rotateX(68deg) translateY(18%) translateX(72px); }
    }

    @keyframes scan {
      from { transform: translateY(-8px); }
      to { transform: translateY(8px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.9; filter: saturate(0.95); }
      50% { opacity: 1; filter: saturate(1.15); }
    }

    @keyframes glitch-a {
      0%, 88%, 100% { clip-path: inset(0 0 0 0); transform: translate(-1px, 0); }
      90% { clip-path: inset(32% 0 44% 0); transform: translate(-3px, 1px); }
      94% { clip-path: inset(72% 0 8% 0); transform: translate(2px, -1px); }
    }

    @keyframes glitch-b {
      0%, 86%, 100% { clip-path: inset(0 0 0 0); transform: translate(1px, 0); }
      89% { clip-path: inset(10% 0 70% 0); transform: translate(3px, 0); }
      93% { clip-path: inset(58% 0 20% 0); transform: translate(-2px, 1px); }
    }

    @media (max-width: 560px) {
      .text { letter-spacing: 0.15em; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
</head>
<body>
  <main class="wrap" aria-label="under construction">
    <h1 class="text" data-text="under construction.">under construction.</h1>
  </main>
  <div class="vignette" aria-hidden="true"></div>
</body>
</html>
